kind = "video"
previewPath = "/hmr-privacy-demo/"
title = "HMR Privacy Demo"
version = "1.0.0"
id = "artifacts/hmr-privacy-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/hmr-privacy-demo/" ]
localPort = 20187

[services.development]
run = "pnpm --filter @workspace/hmr-privacy-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hmr-privacy-demo", "run", "build" ]
publicDir = "artifacts/hmr-privacy-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20187"
BASE_PATH = "/hmr-privacy-demo/"
