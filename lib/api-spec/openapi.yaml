openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ProConnect professional networking and remote jobs platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: health
    description: Health operations
  - name: profiles
    description: User profile operations
  - name: education
    description: Education history operations
  - name: experience
    description: Work experience operations
  - name: portfolio
    description: Portfolio project operations
  - name: skills
    description: User skills operations
  - name: jobs
    description: Remote job listing operations
  - name: applications
    description: Job application operations
  - name: feed
    description: Activity feed and stats
  - name: job-tracker
    description: Unified job application tracker for individual users
  - name: email-integration
    description: Email inbox integration for scanning and importing job applications

paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List profiles
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Profile"
                  total:
                    type: integer
                required: [profiles, total]
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a new profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileFull"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /profiles/{profileId}/education:
    get:
      operationId: listEducation
      tags: [education]
      summary: List education entries for a profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of education entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Education"
    post:
      operationId: createEducation
      tags: [education]
      summary: Add education entry
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEducationBody"
      responses:
        "201":
          description: Education created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Education"

  /profiles/{profileId}/education/{id}:
    put:
      operationId: updateEducation
      tags: [education]
      summary: Update education entry
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEducationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Education"
    delete:
      operationId: deleteEducation
      tags: [education]
      summary: Delete education entry
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /profiles/{profileId}/experience:
    get:
      operationId: listExperience
      tags: [experience]
      summary: List experience entries for a profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of experience entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Experience"
    post:
      operationId: createExperience
      tags: [experience]
      summary: Add experience entry
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExperienceBody"
      responses:
        "201":
          description: Experience created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experience"

  /profiles/{profileId}/experience/{id}:
    put:
      operationId: updateExperience
      tags: [experience]
      summary: Update experience entry
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExperienceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experience"
    delete:
      operationId: deleteExperience
      tags: [experience]
      summary: Delete experience entry
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /profiles/{profileId}/portfolio:
    get:
      operationId: listPortfolio
      tags: [portfolio]
      summary: List portfolio projects for a profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of portfolio projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioProject"
    post:
      operationId: createPortfolioProject
      tags: [portfolio]
      summary: Add portfolio project
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortfolioProjectBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioProject"

  /profiles/{profileId}/portfolio/{id}:
    put:
      operationId: updatePortfolioProject
      tags: [portfolio]
      summary: Update portfolio project
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortfolioProjectBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioProject"
    delete:
      operationId: deletePortfolioProject
      tags: [portfolio]
      summary: Delete portfolio project
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /profiles/{profileId}/skills:
    get:
      operationId: listProfileSkills
      tags: [skills]
      summary: List skills for a profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
    post:
      operationId: addProfileSkill
      tags: [skills]
      summary: Add skill to profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillBody"
      responses:
        "201":
          description: Skill added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"

  /profiles/{profileId}/skills/{id}:
    delete:
      operationId: deleteProfileSkill
      tags: [skills]
      summary: Remove skill from profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List remote jobs
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: experienceLevel
          in: query
          schema:
            type: string
        - name: companyProfileId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"
                  total:
                    type: integer
                required: [jobs, total]
    post:
      operationId: createJob
      tags: [jobs]
      summary: Post a new remote job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update job listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{jobId}/applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: applyToJob
      tags: [applications]
      summary: Apply to a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationBody"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /profiles/{profileId}/applications:
    get:
      operationId: listProfileApplications
      tags: [applications]
      summary: List job applications for a profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  /feed/stats:
    get:
      operationId: getFeedStats
      tags: [feed]
      summary: Get platform stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedStats"

  /feed/featured-profiles:
    get:
      operationId: listFeaturedProfiles
      tags: [feed]
      summary: Get featured/top profiles
      responses:
        "200":
          description: Featured profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"

  /feed/featured-jobs:
    get:
      operationId: listFeaturedJobs
      tags: [feed]
      summary: Get featured remote jobs
      responses:
        "200":
          description: Featured jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /job-tracker/{profileId}:
    get:
      operationId: getJobTracker
      tags: [job-tracker]
      security:
        - BearerAuth: []
      summary: Get unified job tracker (external + native applications) with server-side filtering
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Unified tracker data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobTrackerResponse"
        "400":
          description: Invalid profileId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"




  /external-applications:
    post:
      operationId: createExternalApplication
      tags: [job-tracker]
      security:
        - BearerAuth: []
      summary: Create a manually tracked external application (profileId from Bearer token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExternalApplicationBody"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalApplication"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    get:
      operationId: listExternalApplications
      tags: [job-tracker]
      summary: List external applications for the authenticated caller with server-side filtering
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [saved, applied, screening, interview, offer, accepted, rejected, withdrawn]
        - name: platform
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
            enum: [manual, email, extension, native]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Filtered list
          content:
            application/json:
              schema:
                type: object
                properties:
                  applications:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExternalApplication"
                  page:
                    type: integer
                  limit:
                    type: integer
                required: [applications, page, limit]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /external-applications/{id}:
    patch:
      operationId: updateExternalApplication
      tags: [job-tracker]
      summary: Update an external application (ownership verified via Bearer token)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExternalApplicationBody"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalApplication"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden — token owner does not match record owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteExternalApplication
      tags: [job-tracker]
      summary: Delete an external application (ownership verified via Bearer token)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /profiles/{id}/platform-links:
    patch:
      operationId: updatePlatformLinks
      tags: [job-tracker]
      summary: Update job platform profile URLs for an individual user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlatformLinksBody"
      responses:
        "200":
          description: Updated platform links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformLinks"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /email-integration/initiate:
    post:
      operationId: initiateEmailIntegration
      tags: [email-integration]
      security:
        - BearerAuth: []
      summary: >
        Begin OAuth flow for Gmail or Outlook. Returns an authorization URL.
        In demo mode (no real OAuth credentials configured) also immediately
        marks the account as connected and returns connected: true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateEmailBody"
      responses:
        "200":
          description: Authorization URL + demo-mode status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiateEmailResponse"
        "400":
          description: Invalid provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /email-integration/callback:
    get:
      operationId: emailIntegrationCallback
      tags: [email-integration]
      summary: >
        OAuth redirect target. Exchanges the authorization code for tokens,
        stores the encrypted access/refresh tokens, and redirects to /job-tracker.
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to /job-tracker on success or /?email_error=... on failure

  /email-integration/sync:
    post:
      operationId: syncEmailInbox
      tags: [email-integration]
      security:
        - BearerAuth: []
      summary: >
        Scan the connected inbox and return candidate application records
        (deduplicated against already-imported records). Does NOT save anything.
        Returns simulated data in demo mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncEmailBody"
      responses:
        "200":
          description: Preview of found applications not yet saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncEmailResponse"
        "400":
          description: Invalid provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Provider not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /email-integration/confirm-import:
    post:
      operationId: confirmEmailImport
      tags: [email-integration]
      summary: Save user-selected email-imported applications after inbox preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmImportBody"
      responses:
        "200":
          description: Imported applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmImportResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /email-integration/disconnect:
    post:
      operationId: disconnectEmailIntegration
      tags: [email-integration]
      summary: Disconnect a Gmail or Outlook integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisconnectEmailBody"
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  disconnected:
                    type: boolean
                required: [disconnected]
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

