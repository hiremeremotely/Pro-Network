name: Build & Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Build, push to ECR, deploy to ECS
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required for OIDC — no long-lived AWS keys needed
      contents: read

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS credentials via OIDC ───────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 3. Log in to ECR ──────────────────────────────────────────────────
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build and push Docker image ────────────────────────────────────
      - name: Build, tag, and push Docker image
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}   # e.g. hire-me-remotely
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build \
            --cache-from $REGISTRY/$REPOSITORY:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t $REGISTRY/$REPOSITORY:$SHA_TAG \
            -t $REGISTRY/$REPOSITORY:latest \
            .
          docker push $REGISTRY/$REPOSITORY:$SHA_TAG
          docker push $REGISTRY/$REPOSITORY:latest
          echo "image=$REGISTRY/$REPOSITORY:$SHA_TAG" >> $GITHUB_OUTPUT

      # ── 5. Update ECS task definition with the new image ──────────────────
      - name: Download current ECS task definition
        env:
          TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}  # e.g. hire-me-remotely
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION" \
            --region "$AWS_REGION" \
            --query taskDefinition \
            > task-definition.json

      - name: Inject new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.ECS_CONTAINER_NAME }}   # e.g. app
          image: ${{ steps.build-image.outputs.image }}

      # ── 6. Deploy to ECS service ──────────────────────────────────────────
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}          # e.g. hire-me-remotely-service
          cluster: ${{ secrets.ECS_CLUSTER }}          # e.g. hire-me-remotely-cluster
          wait-for-service-stability: true
