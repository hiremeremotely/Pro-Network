name: Deploy API → ECS Fargate

on:
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - "lib/api-zod/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, push to ECR, deploy to ECS
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS credentials via access key ─────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Log in to ECR ──────────────────────────────────────────────────
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build and push Docker image ────────────────────────────────────
      - name: Build, tag, and push Docker image
        id: build-image
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA_TAG:    ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -f artifacts/api-server/Dockerfile \
            --cache-from "$REGISTRY/$REPOSITORY:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$REGISTRY/$REPOSITORY:$SHA_TAG" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$REPOSITORY:$SHA_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image=$REGISTRY/$REPOSITORY:$SHA_TAG" >> "$GITHUB_OUTPUT"

      # ── 5. Update ECS task definition with the new image ──────────────────
      - name: Download current ECS task definition
        env:
          TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION" \
            --query taskDefinition \
            > task-definition.json

      - name: Inject new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   ${{ secrets.ECS_CONTAINER_NAME }}
          image:            ${{ steps.build-image.outputs.image }}

      # ── 6. Deploy to ECS service ──────────────────────────────────────────
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ secrets.ECS_SERVICE }}
          cluster:                    ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
