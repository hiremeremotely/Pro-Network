name: Deploy API → ECS Fargate

on:
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - "lib/api-zod/**"
      - ".github/workflows/deploy-api.yml"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Cancel any in-progress run for the same branch
concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. AWS auth ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      # ── 3. ECR login ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push Docker image ─────────────────────────────────────────
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG:       ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -f artifacts/api-server/Dockerfile \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # ── 5. Update task definition with the new image ──────────────────────────
      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/ecs-task-definition.json
          container-name:  api-server
          image:           ${{ steps.build-image.outputs.image }}

      # ── 6. Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         ${{ vars.ECS_SERVICE }}
          cluster:         ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
